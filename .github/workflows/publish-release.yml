name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Remove stale APK assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from urllib.error import HTTPError

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          token = os.environ["GITHUB_TOKEN"]
          release_url = f"https://api.github.com/repos/{repo}/releases/tags/{tag}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          try:
              with urllib.request.urlopen(urllib.request.Request(release_url, headers=headers), timeout=60) as response:
                  release = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  print("No existing release yet; skipping stale asset cleanup.")
                  raise SystemExit(0)
              raise

          for asset in release.get("assets", []):
              if asset.get("name") == "simpleToDo-release.apk":
                  delete_req = urllib.request.Request(asset["url"], method="DELETE", headers=headers)
                  with urllib.request.urlopen(delete_req, timeout=60) as delete_response:
                      print(f"deleted {asset['name']} status={delete_response.status}")
          PY

      - name: Copy APK into release folder
        run: |
          mkdir -p APK
          cp app/build/outputs/apk/debug/app-debug.apk APK/Einkaufszettel.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: APK/Einkaufszettel.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
